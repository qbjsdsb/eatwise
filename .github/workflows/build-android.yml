name: Build Android APK

# 触发条件：
# 1. 手动触发（workflow_dispatch）—— 任意分支可手动跑，可选指定 release_tag 上传 APK
# 2. 推送 v* tag —— 自动构建并把 APK 附加到对应 release
# 3. 推送到 trae/agent-E5yTBA 分支 —— 自动构建并把 APK 附加到 BRANCH_BUILD_RELEASE_TAG 指定的 release（CI 测试用）
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '附加 APK 到此 release tag（留空则只上传为 workflow artifact）'
        required: false
        type: string
      target_platforms:
        description: '目标平台（默认 fat 全架构，兼容任意设备/模拟器；arm64 体积小但仅限 64 位真机）'
        required: false
        default: 'android-arm,android-arm64,android-x64'
        type: choice
        options:
          - android-arm,android-arm64,android-x64
          - android-arm64
  push:
    branches:
      - trae/agent-E5yTBA
    tags:
      - 'v*'

# branch push 触发时，APK 附加到此 release（CI 测试目标；改 tag 即可换目标 release）
env:
  BRANCH_BUILD_RELEASE_TAG: v0.9.0

# 防止同 tag/分支并发构建抢资源
concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # 上传 release asset 需要写权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.44.4 (与 v0.8.0 已验证可用构建一致)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date (build_runner)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if ! git diff --exit-code -- lib/data/database/database.g.dart; then
            echo "::error::database.g.dart 与 schema 不同步，请本地跑 'dart run build_runner build --delete-conflicting-outputs' 后重新提交"
            git diff -- lib/data/database/database.g.dart
            exit 1
          fi

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test (exclude smoke)
        run: flutter test --exclude-tags smoke

      - name: Determine target platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "targets=${{ inputs.target_platforms }}" >> "$GITHUB_OUTPUT"
          else
            # push（tag/branch）默认 fat 全架构，兼容任意设备/模拟器（与历史可用构建一致）
            echo "targets=android-arm,android-arm64,android-x64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK (release)
        run: |
          # 从 pubspec 读 version（如 0.9.0+9），取 + 前作为 build-name（gradle 不接受 + 号）
          # versionCode 由 + 后数字决定（Flutter 约定），用于 Android 覆盖升级判断
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=$(echo "$VERSION" | cut -d '+' -f 1)
          BUILD_NUMBER=$(echo "$VERSION" | cut -d '+' -f 2)
          echo "build-name=$BUILD_NAME build-number(versionCode)=$BUILD_NUMBER"
          # --no-tree-shake-icons：与 v0.8.0 一致，避免 CupertinoIcons 字体被误删
          # build.gradle.kts 已显式 isMinifyEnabled=false + isShrinkResources=false 防 R8 剥类崩溃
          flutter build apk --release \
            --no-tree-shake-icons \
            --target-platform "${{ steps.platforms.outputs.targets }}" \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" 2>&1 | tee build.log
          # 校验产物存在
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::APK 产物未生成: $APK"
            exit 1
          fi
          ls -lh "$APK"

      - name: Build debug APK (诊断兜底：release 闪退时显示红屏堆栈)
        # debug 版不优化、不压缩，崩溃时显示完整红色错误页+堆栈，便于定位闪退根因
        # （v0.8.0 release.yml 已验证的诊断策略）
        run: |
          flutter build apk --debug --no-tree-shake-icons 2>&1 | tee -a build.log
          APK="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "::warning::debug APK 未生成（不阻塞 release 发布）"
          else
            ls -lh "$APK"
          fi

      - name: Verify APK contents (架构 + native 库 + 版本号)
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          echo "===== APK 内 lib/ 目录（native 库） ====="
          unzip -l "$APK" | grep -E 'lib/' || { echo "::error::APK 内无 lib/ 目录，native 库缺失，应用将无法启动"; exit 1; }
          echo ""
          echo "===== 各 ABI 的 .so 文件清单 ====="
          unzip -l "$APK" | grep -E '\.so$' | awk '{print $4}' | sort
          echo ""
          echo "===== ABI 计数 ====="
          ABI_COUNT=$(unzip -l "$APK" | grep -oE 'lib/[^/]+/' | sort -u | wc -l)
          echo "包含 ABI 目录数: $ABI_COUNT"
          if [ "$ABI_COUNT" -lt 2 ]; then
            echo "::warning::仅含 $ABI_COUNT 个 ABI，模拟器/旧设备可能无法安装"
          fi
          echo ""
          echo "===== sqlite3mc 加密库检查（drift 依赖，缺失则 DB 打不开） ====="
          if unzip -l "$APK" | grep -q 'libsqlite3mc.so'; then
            echo "✓ libsqlite3mc.so 已打包"
            unzip -l "$APK" | grep 'libsqlite3mc.so'
          else
            echo "::error::libsqlite3mc.so 缺失，加密数据库将无法打开"
            exit 1
          fi
          echo ""
          echo "===== aapt badging（包名/versionCode/versionName/原生架构） ====="
          # 定位 build-tools 中的 aapt
          AAPT=$(ls /usr/local/lib/android/sdk/build-tools/*/aapt 2>/dev/null | sort -V | tail -1)
          if [ -z "$AAPT" ]; then
            echo "::warning::未找到 aapt，跳过 badging 检查"
          else
            "$AAPT" dump badging "$APK" | grep -E '^(package|native-code|sdkVersion|targetSdkVersion)' 
          fi

      - name: Rename APK with version + short SHA
        id: rename
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 2)
          # 确定目标架构后缀
          TARGETS="${{ steps.platforms.outputs.targets }}"
          if echo "$TARGETS" | grep -q ','; then
            ARCH_TAG="fat"
          elif echo "$TARGETS" | grep -q 'arm64'; then
            ARCH_TAG="arm64"
          else
            ARCH_TAG="$TARGETS"
          fi
          # release APK
          REL_NAME="eatwise-v${VERSION}-b${BUILD_NUMBER}-${ARCH_TAG}-${SHORT_SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$REL_NAME"
          ls -lh "$REL_NAME"
          echo "apk_path=$REL_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$REL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # debug APK（诊断用，若存在）
          DBG_SRC="build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$DBG_SRC" ]; then
            DBG_NAME="eatwise-v${VERSION}-b${BUILD_NUMBER}-debug-${SHORT_SHA}.apk"
            cp "$DBG_SRC" "$DBG_NAME"
            ls -lh "$DBG_NAME"
            echo "dbg_path=$DBG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: |
            ${{ steps.rename.outputs.apk_path }}
            ${{ steps.rename.outputs.dbg_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        # 条件：workflow_dispatch 显式提供 release_tag，或 push 触发（tag 或 branch）
        # 同时上传 release + debug APK：release 闪退时改装 debug 看红屏堆栈
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') || github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # tag push：用 tag 名作为 release tag
            TAG="${GITHUB_REF_NAME}"
          else
            # branch push：用顶部 env 指定的固定 release
            TAG="${BRANCH_BUILD_RELEASE_TAG}"
          fi
          echo "上传 ${{ steps.rename.outputs.apk_path }} 到 release $TAG"
          FILES="${{ steps.rename.outputs.apk_path }}"
          # debug APK 一起上传（若存在）
          if [ -n "${{ steps.rename.outputs.dbg_path }}" ] && [ -f "${{ steps.rename.outputs.dbg_path }}" ]; then
            FILES="$FILES ${{ steps.rename.outputs.dbg_path }}"
          fi
          # 用 GitHub CLI（已预装在 ubuntu-latest runner），--clobber 覆盖同名旧资产
          gh release upload "$TAG" $FILES --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
