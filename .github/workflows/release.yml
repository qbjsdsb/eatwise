name: Build & Release APK

# tag 触发：push v* 格式的 tag 自动构建（我可通过 git push tag 触发，无需手动点按钮）
# 保留 workflow_dispatch 作为备用手动入口
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本标签（如 v0.1.0，留空则用日期自动生成）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 创建 Release 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.44.4 (与本地一致，避免兼容问题)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate drift code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 注入 release keystore（从 GitHub Secrets）
        # M16 应用内更新：从 secrets 解码 keystore 到 android/app/，生成 key.properties
        # 未配置 secret 时回退 debug 签名（不阻塞 CI，但 CI build 无法覆盖安装旧版）
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "⚠️  未配置 ANDROID_KEYSTORE_BASE64 secret，回退到 debug 签名（CI build 仍无法覆盖安装）"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/eatwise-release.jks
          cat > android/app/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=eatwise-release.jks
          EOF
          echo "✅ keystore 注入完成"

      - name: Build release APK
        # 有 key.properties 用固定 release 签名（支持覆盖安装），否则回退 debug
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build debug APK (诊断用，崩溃显示红屏堆栈)
        # debug 版不优化，崩溃时显示完整红色错误页+堆栈，便于定位闪退根因
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Get version from pubspec
        id: version
        run: |
          # 从 pubspec.yaml 读 version: x.y.z+N，取 x.y.z 作 versionName
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "pubspec_version=$PUBSPEC_VERSION" >> $GITHUB_OUTPUT
          echo "读取到版本号: $PUBSPEC_VERSION"

      - name: Determine release tag
        id: tag
        run: |
          # tag 触发：直接用 tag 名
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
          elif [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            TAG="v${{ steps.version.outputs.pubspec_version }}-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "将使用标签: $TAG"

      - name: Verify APK exists
        run: |
          echo "=== release apk ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          file build/app/outputs/flutter-apk/app-release.apk
          echo "=== debug apk ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          file build/app/outputs/flutter-apk/app-debug.apk

      - name: Diagnose APK contents (native libs + CPU arch)
        # 打印 apk 内的 native 库和支持的 CPU 架构，用于排查闪退根因
        run: |
          echo "=== APK 内 native 库(.so)与 CPU 架构 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E '\.so$' | awk '{print $4}' | sort
          echo ""
          echo "=== 支持的 CPU 架构(目录名) ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -oE 'lib/[^/]+/' | sort -u
          echo ""
          echo "=== APK 总大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk | awk '{print $5}'

      - name: Upload APK artifacts (90 天保留)
        uses: actions/upload-artifact@v4
        with:
          name: eatwise-apk-${{ steps.tag.outputs.release_tag }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Extract changelog for this version
        # 从 CHANGELOG.md 提取本版本（v0.25.0 → v0.25.0）对应段落
        # 用 python 解析 markdown：找 "## [vX.Y.Z]" 段，到下一个 "## " 结束
        id: changelog
        run: |
          python3 << 'PYEOF' > /tmp/changelog.md
          import re, sys
          tag = "${{ steps.tag.outputs.release_tag }}"  # e.g. "v0.25.0"
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              content = f.read()
          # 匹配 ## [vX.Y.Z] 段（含或不含日期）
          pattern = re.compile(
              r"(##\s*\[" + re.escape(tag) + r"\][^\n]*\n)(.*?)(?=\n##\s*\[|\Z)",
              re.DOTALL,
          )
          m = pattern.search(content)
          if m:
              # 段落正文（不含标题行）
              body = m.group(2).strip()
              # 如果是空 Unreleased 占位，写明无变更
              if not body:
                  print("(本版本 CHANGELOG 段为空，详见仓库 CHANGELOG.md)")
              else:
                  print(body)
          else:
              print(f"(未在 CHANGELOG.md 找到 {tag} 段，详见仓库 CHANGELOG.md)")
          PYEOF
          echo "=== 提取到的 changelog ==="
          cat /tmp/changelog.md
          # 用 delimiter 多行写入 GITHUB_OUTPUT，避免换行被吞
          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: EatWise ${{ steps.tag.outputs.release_tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ## 📦 安装说明

            1. 下载下方 apk（优先下 app-release.apk）
            2. 手机用数据线传过去（或扫码下载）
            3. 手机设置开启"允许安装未知来源应用"
            4. **直接覆盖安装即可**（v0.18.0 起用固定 keystore 签名，无需卸载旧版；v0.17.0 及之前需先卸载一次以切换签名）
            5. 首次启动在「设置」页填入你的 Qwen API Key（视觉识别用）
            6. 在「设置 → 检查更新」可一键升级到下一版

            ## ⚠️ 闪退排查：请先装 app-debug.apk

            如果 app-release.apk 闪退，请改装 **app-debug.apk**：
            - debug 版崩溃时会显示**红色错误页+完整堆栈**
            - 截图发给开发者即可定位根因

            ## 签名说明

            本包使用固定 release 签名（v0.18.0 起），可正常覆盖安装，
            但**不能上架应用商店**。

            ## 版本信息

            - 应用版本: ${{ steps.version.outputs.pubspec_version }}
            - 构建时间: ${{ github.run_id }}
            - 提交: ${{ github.sha }}
            - 完整 changelog: [CHANGELOG.md](https://github.com/qbjsdsb/eatwise/blob/main/CHANGELOG.md)
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          make_latest: true

      - name: Force update release body (changelog)
        # action-gh-release 在 release 已存在时可能不更新 body，用 API 强制 PATCH
        # 将 changelog + 安装说明组合 body 写入 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -e
          # 查 release id
          RELEASE_ID=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "release_id=$RELEASE_ID"

          # 组装 body：changelog + 分隔线 + 安装说明
          cat > /tmp/release_body.md <<BODY_EOF
          ${{ steps.changelog.outputs.body }}

          ---

          ## 📦 安装说明

          1. 下载下方 apk（优先下 app-release.apk）
          2. 手机用数据线传过去（或扫码下载）
          3. 手机设置开启"允许安装未知来源应用"
          4. **直接覆盖安装即可**（v0.18.0 起用固定 keystore 签名，无需卸载旧版；v0.17.0 及之前需先卸载一次以切换签名）
          5. 首次启动在「设置」页填入你的 Qwen API Key（视觉识别用）
          6. 在「设置 → 检查更新」可一键升级到下一版

          ## ⚠️ 闪退排查：请先装 app-debug.apk

          如果 app-release.apk 闪退，请改装 **app-debug.apk**：
          - debug 版崩溃时会显示**红色错误页+完整堆栈**
          - 截图发给开发者即可定位根因

          ## 签名说明

          本包使用固定 release 签名（v0.18.0 起），可正常覆盖安装，
          但**不能上架应用商店**。

          ## 版本信息

          - 应用版本: ${{ steps.version.outputs.pubspec_version }}
          - 构建时间: ${{ github.run_id }}
          - 提交: ${{ github.sha }}
          - 完整 changelog: [CHANGELOG.md](https://github.com/qbjsdsb/eatwise/blob/main/CHANGELOG.md)
          BODY_EOF

          # 用 python 构造 JSON body（避免 shell 转义问题）
          python3 -c "
          import json
          with open('/tmp/release_body.md','r',encoding='utf-8') as f:
              body = f.read().lstrip()  # 去掉前导空格（heredoc 缩进）
          # 去掉每行前导 10 空格（heredoc 缩进）
          lines = [line[10:] if line.startswith('          ') else line for line in body.split('\n')]
          body = '\n'.join(lines)
          print(json.dumps({'body': body}))
          " > /tmp/patch_payload.json
          echo "=== patch payload size ==="
          wc -c /tmp/patch_payload.json

          # PATCH 更新 release body
          curl -s -X PATCH \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d @/tmp/patch_payload.json \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('updated release:', d.get('html_url'), 'body_len:', len(d.get('body','')))"
