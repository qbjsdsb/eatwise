name: Build & Release APK

# 手动触发（推荐小白用）：在 GitHub Actions 页面点 "Run workflow"
# 也可在 workflow_dispatch 输入版本号，默认从 pubspec.yaml 读取
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本标签（如 v0.1.0，留空则用日期自动生成）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 创建 Release 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.44.4 (与本地一致，避免兼容问题)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate drift code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        # release 用 debug 签名（build.gradle.kts 已配 signingConfig debug）
        # Flutter/Android SDK 自带 debug keystore，CI 环境自动生成可用签名
        run: flutter build apk --release --no-tree-shake-icons

      - name: Get version from pubspec
        id: version
        run: |
          # 从 pubspec.yaml 读 version: x.y.z+N，取 x.y.z 作 versionName
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "pubspec_version=$PUBSPEC_VERSION" >> $GITHUB_OUTPUT
          echo "读取到版本号: $PUBSPEC_VERSION"

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            TAG="v${{ steps.version.outputs.pubspec_version }}-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "将使用标签: $TAG"

      - name: Verify APK exists
        run: |
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          file build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact (90 天保留)
        uses: actions/upload-artifact@v4
        with:
          name: eatwise-apk-${{ steps.tag.outputs.release_tag }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: EatWise ${{ steps.tag.outputs.release_tag }}
          body: |
            ## 安装说明

            1. 下载下方 `app-release.apk`
            2. 手机用数据线传过去（或扫码下载）
            3. 手机设置开启"允许安装未知来源应用"
            4. 点击 apk 安装
            5. 首次启动在「设置」页填入你的 Qwen API Key（视觉识别用）

            ## 签名说明

            本包使用 debug 签名（自用版），可正常安装运行，
            但**不能上架应用商店**。如需正式发布需配置专属签名密钥。

            ## 版本信息

            - 应用版本: ${{ steps.version.outputs.pubspec_version }}
            - 构建时间: ${{ github.run_id }}
            - 提交: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
