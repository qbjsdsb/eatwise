name: eatwise
description: 拍照识别食物热量 + 营养记录 + AI 汇总建议（个人自用）
publish_to: 'none'
version: 0.32.0+45

environment:
  sdk: ^3.10.0  # drift 2.34.0 要求 Min Dart SDK 3.10（pub.dev 已核实）

dependencies:
  flutter:
    sdk: flutter

  # 数据库（drift 2.32+ + sqlite3mc 加密）
  drift: ^2.34.0
  sqlite3: ^3.3.2
  # 注意：不要加 sqlite3_flutter_libs（已 EOL）
  # 注意：不要加 sqlcipher_flutter_libs（已 EOL，drift 2.32+ 用 sqlite3mc 替代）

  # 密钥存储
  flutter_secure_storage: ^10.3.1

  # 状态管理 + 路由
  flutter_riverpod: ^3.3.1  # 3.3.2 仅为 3.3.2-dev.2 prerelease，最新稳定版是 3.3.1（pub.dev 已核实）
  # 动态取色（Material You，Android 12+ 壁纸取色）
  dynamic_color: ^1.7.0
  go_router: ^17.2.0  # pub 的 ^ 约束需完整 major.minor.patch，原计划 "^17.2" 缺 patch 号会报错

  # 拍照 + 图片预处理
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0
  image: ^4.5.3  # 图片预检（模糊检测，解码后算拉普拉斯方差）

  # 网络 + 离线检测
  connectivity_plus: ^6.1.0
  http: ^1.2.0  # OFF 云查兜底（Open Food Facts API）

  # 大模型 API（OpenAI-compatible，百炼/智谱通用）
  openai_dart: ^7.0.0

  # 图表
  fl_chart: ^0.70.0

  # 工具
  path_provider: ^2.1.0
  path: ^1.9.0
  uuid: ^4.5.0

  # 错误监控（Sprint 3 T17）
  sentry_flutter: ^9.22.0

  # 后台兜底（Sprint 3 T19）
  workmanager: ^0.9.0

  # 应用版本号动态读取（M13：替代三处硬编码）
  package_info_plus: ^8.0.0

  # M27 蓝牙体重秤同步：BLE 被动扫描 + 权限请求
  flutter_blue_plus: ^2.3.10
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # drift 代码生成 + 迁移工具
  drift_dev: ^2.34.0  # 2.34.1 不存在，最新稳定版是 2.34.0（pub.dev 已核实）
  build_runner: ^2.15.0

  # 测试
  mocktail: ^1.0.0

  # 测试 mock path_provider（transitive，显式声明避免 depend_on_referenced_packages 警告）
  path_provider_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/sanotsu_common.json
    - assets/brand_foods.json
    - assets/chain_drink_menu.json
    - assets/privacy_policy.md
